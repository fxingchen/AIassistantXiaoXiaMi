<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data: https:; connect-src https://api.siliconflow.cn https://api.deepseek.com https://dashscope.aliyuncs.com https://open.bigmodel.cn https://api.moonshot.cn https://api.openai.com;">
<title>小虾米 AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f17;
    --bg2: #16161f;
    --bg3: #1e1e2e;
    --border: #2a2a3f;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent-glow: rgba(124,58,237,0.25);
    --text: #e2e0f0;
    --text-dim: #8b8aac;
    --text-muted: #5c5b7a;
    --user-bg: #1a1040;
    --ai-bg: #0f1526;
    --code-bg: #0a0a14;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --shadow: 0 4px 16px rgba(0,0,0,0.3);
    --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Light theme */
  [data-theme="light"] {
    --bg: #ffffff;
    --bg2: #f8f9fa;
    --bg3: #e9ecef;
    --border: #dee2e6;
    --accent: #6d28d9;
    --accent2: #9333ea;
    --accent-glow: rgba(109,40,217,0.15);
    --text: #1a1a2e;
    --text-dim: #495057;
    --text-muted: #6c757d;
    --user-bg: #ede9fe;
    --ai-bg: #f8f9fa;
    --code-bg: #f1f3f5;
    --shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  /* Ocean theme */
  [data-theme="ocean"] {
    --bg: #0c1929;
    --bg2: #132238;
    --bg3: #1a2d47;
    --border: #2a4158;
    --accent: #06b6d4;
    --accent2: #22d3ee;
    --accent-glow: rgba(6,182,212,0.25);
    --text: #e0f2fe;
    --text-dim: #7dd3fc;
    --text-muted: #38bdf8;
    --user-bg: #0e2a3d;
    --ai-bg: #0a1f2e;
    --code-bg: #061522;
    --green: #10b981;
    --red: #f43f5e;
    --yellow: #fbbf24;
  }

  /* Forest theme */
  [data-theme="forest"] {
    --bg: #0d1912;
    --bg2: #152117;
    --bg3: #1e2e1f;
    --border: #2a4a2e;
    --accent: #10b981;
    --accent2: #34d399;
    --accent-glow: rgba(16,185,129,0.25);
    --text: #ecfdf5;
    --text-dim: #6ee7b7;
    --text-muted: #34d399;
    --user-bg: #0f2a17;
    --ai-bg: #0a1f10;
    --code-bg: #081510;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #header .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  #header .title { font-weight: 600; font-size: 13px; flex: 1; }
  #header .subtitle { font-size: 10px; color: var(--text-muted); }

  #model-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 10px;
    cursor: pointer;
    outline: none;
    max-width: 120px;
    height: 26px;
  }
  #model-select:focus { border-color: var(--accent); }

  #new-chat-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 6px;
    padding: 3px 8px; font-size: 11px; cursor: pointer;
    transition: all 0.15s;
  }
  #new-chat-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.user .msg-avatar {
    background: linear-gradient(135deg, #1d4ed8, #7c3aed);
    box-shadow: 0 0 6px rgba(124,58,237,0.3);
  }
  .msg.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #ec4899);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .msg-content {
    max-width: calc(100% - 40px);
    display: flex; flex-direction: column; gap: 4px;
  }
  .msg.user .msg-content { align-items: flex-end; }

  .msg-bubble {
    padding: 8px 11px;
    border-radius: 12px;
    font-size: 12.5px;
    line-height: 1.65;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px 4px 12px 12px;
    color: var(--text);
  }
  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
    color: var(--text);
  }
  .msg.ai .msg-bubble.streaming::after {
    content: '▋';
    display: inline-block;
    animation: blink 0.7s steps(1) infinite;
    color: var(--accent2);
    margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Markdown styles inside bubbles */
  .msg-bubble p { margin: 0 0 6px; }
  .msg-bubble p:last-child { margin: 0; }
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 {
    font-size: 13px; font-weight: 700;
    margin: 8px 0 4px; color: var(--accent2);
  }
  .msg-bubble ul, .msg-bubble ol { padding-left: 16px; margin: 4px 0; }
  .msg-bubble li { margin: 2px 0; }
  .msg-bubble code {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11.5px;
    color: #c4b5fd;
  }
  .msg-bubble pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 6px 0;
    overflow: hidden;
  }
  .msg-bubble pre .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 10px;
    background: #0d0d1a;
    border-bottom: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
  }
  .msg-bubble pre .copy-btn {
    background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    font-size: 10px; padding: 2px 6px;
    border-radius: 4px; transition: all 0.15s;
  }
  .msg-bubble pre .copy-btn:hover { background: var(--border); color: var(--text); }
  .msg-bubble pre code {
    display: block; padding: 10px;
    background: none; border: none;
    white-space: pre; overflow-x: auto;
    font-size: 11.5px; line-height: 1.5;
    color: #a9b1d6;
  }
  .msg-bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 10px; margin: 6px 0;
    color: var(--text-dim);
  }
  .msg-bubble a { color: var(--accent2); text-decoration: none; }
  .msg-bubble a:hover { text-decoration: underline; }
  .diff-add { display: block; background: rgba(80,200,100,0.15); color: #7ec87e; }
  .diff-del { display: block; background: rgba(220,80,80,0.15); color: #e06c75; }
  .diff-meta { display: block; color: #61afef; }
  .msg-bubble strong { color: #fff; font-weight: 600; }
  .msg-bubble em { color: var(--accent2); }
  .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .msg-bubble table { border-collapse: collapse; width: 100%; font-size: 11.5px; }
  .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 4px 8px; }
  .msg-bubble th { background: var(--bg3); color: var(--accent2); }

  .msg-meta {
    display: flex; align-items: center; gap: 6px;
    padding: 0 4px;
  }

  .msg-time {
    font-size: 10px; color: var(--text-muted);
  }

  .msg-model {
    font-size: 9.5px; color: var(--text-muted);
    opacity: 0.7;
  }

  /* Image in message */
  .msg-bubble img {
    max-width: 100%; max-height: 200px;
    border-radius: 8px; margin: 4px 0;
    border: 1px solid var(--border);
    display: block;
  }

  /* Code context block */
  .context-block {
    background: var(--code-bg);
    border: 1px solid var(--accent);
    border-radius: 8px;
    margin-bottom: 4px;
    overflow: hidden;
    font-size: 11px;
  }
  .context-block .context-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 10px;
    background: rgba(124,58,237,0.1);
    color: var(--accent2); font-size: 10px;
  }
  .context-block .context-header .remove-ctx {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 12px; padding: 0 2px;
    line-height: 1;
  }
  .context-block .context-header .remove-ctx:hover { color: var(--red); }
  .context-block code {
    display: block; padding: 8px 10px;
    background: none; border: none;
    white-space: pre; overflow-x: auto;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px; max-height: 120px; color: #a9b1d6;
  }

  /* Welcome */
  #welcome {
    text-align: center; padding: 30px 16px;
    animation: fadeIn 0.4s ease;
  }
  #welcome .w-icon { width: 60px; height: 60px; margin: 0 auto 8px; }
  #welcome .w-icon svg { width: 100%; height: 100%; }
  #welcome h2 { font-size: 15px; color: var(--text); margin-bottom: 4px; }
  #welcome p { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }
  #welcome .shortcuts {
    display: flex; flex-direction: column; gap: 6px;
    text-align: left;
  }
  #welcome .shortcut {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 11px; color: var(--text-dim);
    cursor: pointer; transition: all 0.15s;
  }
  #welcome .shortcut:hover {
    border-color: var(--accent); color: var(--text);
    background: rgba(124,58,237,0.05);
  }
  #welcome .shortcut .s-icon { font-size: 14px; flex-shrink: 0; }
  #welcome .shortcut kbd {
    margin-left: auto; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 1px 5px; font-size: 10px; color: var(--text-muted);
    font-family: inherit;
  }

  /* ── Preview area (images + code context) ── */
  #preview-area {
    padding: 4px 10px 0;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  #preview-area:empty { padding: 0; }

  .img-preview {
    position: relative; display: inline-block;
  }
  .img-preview img {
    height: 56px; width: 56px; object-fit: cover;
    border-radius: 8px; border: 1px solid var(--accent);
    display: block;
  }
  .img-preview .remove-img {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: var(--red); color: #fff;
    border: none; border-radius: 50%;
    font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  .ctx-chip {
    display: flex; align-items: center; gap: 4px;
    background: rgba(124,58,237,0.12);
    border: 1px solid var(--accent);
    border-radius: 6px; padding: 3px 8px;
    font-size: 10px; color: var(--accent2);
  }
  .ctx-chip .remove-chip {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 12px; padding: 0; line-height: 1;
    margin-left: 2px;
  }
  .ctx-chip .remove-chip:hover { color: var(--red); }

  /* ── Auto-context bar ── */
  #auto-ctx-bar {
    display: none;
    padding: 3px 8px 0;
    flex-wrap: wrap;
    gap: 4px;
  }
  .auto-ctx-chip {
    display: flex; align-items: center; gap: 4px;
    background: rgba(34,197,94,0.07);
    border: 1px solid rgba(34,197,94,0.28);
    border-radius: 6px; padding: 2px 7px;
    font-size: 10px; color: #4ade80;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    max-width: 100%; overflow: hidden;
  }
  .auto-ctx-chip .lang-badge {
    background: rgba(34,197,94,0.15);
    border-radius: 3px; padding: 0 3px;
    font-size: 9px; flex-shrink: 0;
    text-transform: uppercase;
  }
  .auto-ctx-chip .chip-label {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .auto-ctx-chip .remove-auto {
    background: none; border: none;
    color: rgba(34,197,94,0.4); cursor: pointer;
    font-size: 12px; padding: 0; line-height: 1;
    margin-left: 2px; flex-shrink: 0;
  }
  .auto-ctx-chip .remove-auto:hover { color: var(--red); }

  /* ── Input area ── */
  #input-area {
    padding: 6px 8px 8px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    position: relative;
  }

  /* Slash command popup */
  #cmd-popup {
    position: absolute;
    bottom: 100%; left: 8px; right: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow-y: auto;
    max-height: 280px;
    margin-bottom: 4px;
    z-index: 50;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
  }
  .cmd-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer;
    font-size: 12px; color: var(--text-dim);
    transition: background 0.1s;
  }
  .cmd-item:hover, .cmd-item.selected { background: rgba(124,58,237,0.12); color: var(--text); }
  .cmd-name { color: var(--accent2); font-weight: 600; min-width: 56px; font-size: 12px; }
  .cmd-desc { color: var(--text-muted); font-size: 11px; }

  /* Unified input box (VS Code style) */
  #input-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: border-color 0.15s;
    overflow: hidden;
  }
  #input-box:focus-within { border-color: var(--accent); }
  #input-box.dragover { border-color: var(--accent2); background: rgba(124,58,237,0.06); }

  #input {
    width: 100%; background: none;
    border: none; outline: none;
    color: var(--text); font-size: 12.5px;
    font-family: inherit; line-height: 1.5;
    resize: none; padding: 9px 12px 5px;
    max-height: 120px; min-height: 34px;
    scrollbar-width: thin; display: block;
  }
  #input::placeholder { color: var(--text-muted); }

  /* Action bar at bottom of input box */
  #action-bar {
    display: flex; align-items: center;
    padding: 3px 6px 4px 8px; gap: 1px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  #action-left { display: flex; align-items: center; gap: 1px; flex: 1; }
  .action-btn {
    background: none; border: none;
    color: var(--text-muted); border-radius: 5px;
    width: 26px; height: 24px; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .action-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }
  .action-btn.active { color: var(--accent2); background: rgba(124,58,237,0.12); }

  #send-btn {
    width: 28px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border: none; color: #fff; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
    box-shadow: 0 2px 6px var(--accent-glow);
  }
  #send-btn:hover { transform: scale(1.05); }
  #send-btn:active { transform: scale(0.96); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #send-btn.stop { background: linear-gradient(135deg, #dc2626, #ef4444); }

  /* ── API key setup ── */
  #setup-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; gap: 12px;
    animation: fadeIn 0.3s ease;
  }
  #setup-overlay .s-icon { font-size: 36px; }
  #setup-overlay h2 { font-size: 15px; color: var(--text); }
  #setup-overlay p { font-size: 11px; color: var(--text-dim); text-align: center; max-width: 240px; }
  #setup-overlay input {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; color: var(--text);
    font-size: 12px; outline: none;
  }
  #setup-overlay input:focus { border-color: var(--accent); }
  #setup-overlay button {
    width: 100%; background: linear-gradient(135deg, var(--accent), #a855f7);
    border: none; color: #fff; border-radius: 8px;
    padding: 9px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  #setup-overlay button:hover { opacity: 0.9; }
  #setup-overlay .setup-hint {
    font-size: 10px; color: var(--text-muted); text-align: center;
  }
  #setup-overlay .setup-hint a { color: var(--accent2); text-decoration: none; }

  /* ── Status bar ── */
  #status-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 4px var(--green);
    flex-shrink: 0;
  }
  .status-dot.thinking { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); animation: pulse 1s ease-in-out infinite; }
  .status-dot.error { background: var(--red); box-shadow: 0 0 4px var(--red); animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  #status-text { flex: 1; }
  #token-count { color: var(--text-muted); }

  /* scrollbar for code */
  pre code::-webkit-scrollbar { height: 4px; }
  pre code::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── History drawer ── */
  #history-drawer {
    position: fixed; inset: 0; z-index: 200;
    display: none;
  }
  #history-drawer.open { display: block; }
  #drawer-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(2px);
  }
  #drawer-panel {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
  }
  #history-drawer.open #drawer-panel { transform: translateX(0); }
  #drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text);
  }
  #drawer-close {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 16px; line-height: 1; padding: 2px;
  }
  #drawer-close:hover { color: var(--text); }
  #drawer-new-btn {
    margin: 8px 10px;
    background: rgba(124,58,237,0.15);
    border: 1px solid var(--accent);
    color: var(--accent2); border-radius: 7px;
    padding: 7px 10px; font-size: 11px; cursor: pointer;
    text-align: left; transition: all 0.15s;
  }
  #drawer-new-btn:hover { background: rgba(124,58,237,0.25); }
  #drawer-list {
    flex: 1; overflow-y: auto; padding: 4px 8px;
  }
  #drawer-list::-webkit-scrollbar { width: 3px; }
  #drawer-list::-webkit-scrollbar-thumb { background: var(--border); }
  .drawer-item {
    padding: 8px 10px; border-radius: 7px;
    font-size: 11px; color: var(--text-dim);

    display: flex; align-items: center; gap: 6px;

    transition: opacity 0.15s;
  }
  .drawer-item:hover .di-actions { opacity: 1; }
  .drawer-item .di-rename, .drawer-item .di-del {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 12px; padding: 0 2px; line-height: 1;
    transition: color 0.15s;
  }
  .drawer-item .di-rename:hover { color: var(--accent2); }
  .drawer-item .di-del:hover { color: var(--red); }
  .drawer-item .di-title-input {

    color: var(--text); font-size: 11px;
    padding: 1px 5px; outline: none;
    min-width: 0;
  }
  #drawer-empty {
    text-align: center; padding: 30px 10px;
    font-size: 11px; color: var(--text-muted);
  }

  #hist-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 6px;
    padding: 3px 7px; font-size: 11px; cursor: pointer;
    transition: all 0.15s; flex-shrink: 0;
  }
  #hist-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  #export-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 6px;
    padding: 3px 7px; font-size: 11px; cursor: pointer;
    transition: all 0.15s; flex-shrink: 0;
  }
  #export-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  #theme-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 6px;
    padding: 3px 7px; font-size: 11px; cursor: pointer;
    transition: all 0.15s; flex-shrink: 0;
  }
  #theme-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Theme selector popup */
  #theme-popup {
    position: absolute;
    top: 100%;
    right: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    display: none;
    flex-direction: column;
    gap: 4px;
    min-width: 120px;
    box-shadow: var(--shadow);
    z-index: 100;
  }
  #theme-popup.show { display: flex; }
  .theme-option {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    transition: var(--transition);
  }
  .theme-option:hover { background: var(--bg2); color: var(--text); }
  .theme-option.active { background: var(--accent); color: white; }
  .theme-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid var(--border);
  }

  .msg-retry {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 12px; padding: 0 3px;
    opacity: 0; transition: opacity 0.15s;
  }
  .msg:hover .msg-retry { opacity: 1; }
  .msg-retry:hover { color: var(--accent2); }

  .apply-btn { color: #4ade80 !important; }
  .apply-btn:hover { background: rgba(34,197,94,0.1) !important; }

function getOntology() {
  try { return JSON.parse(localStorage.getItem('vsc_ontology') || '{"entities":[],"relations":[]}'); }
  catch { return { entities: [], relations: [] }; }
}
function saveOntology(data) {
  try { localStorage.setItem('vsc_ontology', JSON.stringify(data)); } catch {}
}
function ontologyAddEntity(type, properties) {
  const data = getOntology();
  const id = 'e_' + Date.now();
  data.entities.push({ id, type, properties, created: new Date().toISOString() });
  saveOntology(data);
  return id;
}
function ontologySearch(query) {
  const { entities } = getOntology();
  const q = query.toLowerCase();
  return entities.filter(e => JSON.stringify(e.properties).toLowerCase().includes(q));
}
function buildOntologyPrompt(userMsg) {
  const relevant = ontologySearch(userMsg);
  if (!relevant.length) return '';
  return '\n\n【知识库（与当前话题相关）】\n' +
    relevant.slice(0, 5).map(e =>
      `[${e.type}] ${Object.entries(e.properties).map(([k, v]) => `${k}:${v}`).join('，')}`
    ).join('\n');
}

// ── Session management ──
function saveSession() {
  if (!currentSessionId || history.length === 0) return;
  const storable = history.map(m => ({
    role: m.role,
    content: typeof m.content === 'string' ? m.content : '[图片/代码消息]'
  }));
  const title = storable[0]?.content?.slice(0, 28) || '新对话';
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  const entry = { id: currentSessionId, title, messages: storable, time: Date.now() };
  if (idx >= 0) sessions[idx] = entry;
  else sessions.unshift(entry);
  try {
    localStorage.setItem('vsc_sessions', JSON.stringify(sessions.slice(0, 50)));
  } catch (e) {
    // localStorage 空间不足时，丢弃最旧的几条再试
    sessions = sessions.slice(0, 20);
    try { localStorage.setItem('vsc_sessions', JSON.stringify(sessions)); } catch {}
  }
  localStorage.setItem('vsc_last_session_id', currentSessionId);
  vscode.postMessage({ type: 'saveSessions', sessions: sessions.slice(0, 50), lastSessionId: currentSessionId });
  renderDrawerList();
}

function renderDrawerList() {
  const list = document.getElementById('drawer-list');
  if (sessions.length === 0) {
    list.innerHTML = '<div id="drawer-empty">还没有历史记录</div>';
    return;
  }
  list.innerHTML = '';
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'drawer-item' + (s.id === currentSessionId ? ' active' : '');
    item.innerHTML = `<span class="di-icon">💬</span><span class="di-title" style="flex:1;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.title)}</span><div class="di-actions"><button class="di-rename" title="重命名">✏</button><button class="di-del" title="删除">✕</button></div>`;
    item.addEventListener('click', e => {
      if (e.target.classList.contains('di-del') || e.target.classList.contains('di-rename')) return;
      loadSession(s.id);
      closeDrawer();
    });
    item.querySelector('.di-del').addEventListener('click', e => {
      e.stopPropagation();
      deleteSession(s.id);
    });
    item.querySelector('.di-rename').addEventListener('click', e => {
      e.stopPropagation();
      startRename(item, s);
    });
    list.appendChild(item);
  });
}

function startRename(item, s) {
  const titleSpan = item.querySelector('.di-title');
  const input = document.createElement('input');
  input.className = 'di-title-input';
  input.value = s.title;
  titleSpan.replaceWith(input);
  input.focus();
  input.select();

  function commit() {
    const newTitle = input.value.trim() || s.title;
    s.title = newTitle;
    const idx = sessions.findIndex(x => x.id === s.id);
    if (idx >= 0) sessions[idx].title = newTitle;
    try { localStorage.setItem('vsc_sessions', JSON.stringify(sessions)); } catch {}
    renderDrawerList();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); renderDrawerList(); }
  });
}

function loadSession(id) {
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  currentSessionId = id;
  history = [...s.messages];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  history.forEach(m => {
    if (m.role === 'user') addUserMessage(m.content, [], null);
    else addAIMessageStatic(m.content);

}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  try { localStorage.setItem('vsc_sessions', JSON.stringify(sessions)); } catch {}
  vscode.postMessage({ type: 'saveSessions', sessions, lastSessionId: currentSessionId });
  if (currentSessionId === id) {
    startNewChat();
  } else {
    renderDrawerList();
  }
}

window.addEventListener('message', e => {
  const msg = e.data;
  if (msg.type === 'loadSessions') {
    if (Array.isArray(msg.sessions) && msg.sessions.length > 0) {
      sessions = msg.sessions;
      try { localStorage.setItem('vsc_sessions', JSON.stringify(sessions)); } catch {}
    }
    const lastId = msg.lastSessionId || localStorage.getItem('vsc_last_session_id');
    if (lastId && sessions.find(s => s.id === lastId)) {
      if (!currentSessionId) loadSession(lastId);
    } else {
      renderDrawerList();
    }
  } else if (msg.type === 'codeContext') {
    setPendingContext(msg.label, msg.code, msg.lang);
  } else if (msg.type === 'autoContext') {
    if (msg.clear) {
      autoCtx = null;
    } else {
      autoCtx = { label: msg.label, code: msg.code, lang: msg.lang };
    }
    renderAutoCtxBar();
  } else if (msg.type === 'loadApiKey') {
    if (msg.key) {
      apiKey = msg.key;
      localStorage.setItem('sf_api_key', msg.key);
      document.getElementById('setup-overlay').style.display = 'none';
    }
  } else if (msg.type === 'applyCodeResult') {
    if (msg.success) showToast('✅ 代码已写入编辑器');
    else showToast('⚠️ ' + (msg.error || '应用失败，请先打开文件'));
  } else if (msg.type === 'editorContext') {
    if (msg.error) {
      setStatus(msg.error, 'error');
      addSystemHint(msg.error);
    }
  } else if (msg.type === 'toolResponse' && msg.tool === 'generate-image') {
    const b = window._imageBubble;
    if (b) {
      b.classList.remove('streaming');
      if (msg.error) {
        b.innerHTML = renderMarkdown(`⚠️ 图片生成失败：${escapeHtml(msg.error)}`);
      } else {
        b.innerHTML = `<div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">🎨 ${escapeHtml(msg.prompt || '')}</div>` +
          `<img src="data:${msg.mimeType};base64,${msg.imageData}" style="max-width:100%;border-radius:8px;display:block" />`;
        history.push({ role: 'assistant', content: `[已生成图片：${msg.prompt}]` });
        saveSession();
      }
      window._imageBubble = null;
      setStatus('就绪');
      scrollBottom();
    }
  } else if (msg.type === 'toolResponse' && msg.tool === 'browse') {
    const b = window._browseBubble;
    if (b) {
      b.classList.remove('streaming');
      b.innerHTML = renderMarkdown(msg.error ? `⚠️ ${escapeHtml(msg.error)}` : msg.result);
      history.push({ role: 'assistant', content: msg.result || msg.error });
      saveSession(); setStatus('就绪'); scrollBottom();
      window._browseBubble = null;
    }
  } else if (msg.type === 'toolResponse' && msg.tool === 'maton-api') {
    const b = window._matonBubble;
    if (b) {
      b.classList.remove('streaming');
      b.innerHTML = renderMarkdown(msg.error ? `⚠️ ${escapeHtml(msg.error)}` : '```json\n' + msg.result + '\n```');
      history.push({ role: 'assistant', content: msg.result || msg.error });
      saveSession(); setStatus('就绪'); scrollBottom();
      window._matonBubble = null;
    }
  } else if (msg.type === 'toolResponse' && (msg.tool === 'admapix-search' || msg.tool === 'admapix-deep')) {
    const b = window._admapixBubble;

      b.classList.remove('streaming');

      pendingSearchEl.classList.remove('streaming');
      pendingSearchEl.innerHTML = renderMarkdown(msg.result);
      pendingSearchEl = null;
      setStatus('就绪');
      history.push({ role: 'assistant', content: msg.result });
      saveSession();
      scrollBottom();
    }
  } else if (msg.type === 'toolResponse' && msg.tool === 'baidu-search') {
    const b = window._baiduBubble;
    if (b) {
      b.classList.remove('streaming');
      const text = msg.result?.error ? `⚠️ 百度搜索失败：${msg.result.error}` : `🔍 **百度搜索结果**\n\n${msg.result?.text || '无结果'}`;
      b.innerHTML = renderMarkdown(text);
      window._baiduBubble = null;
      history.push({ role: 'assistant', content: text });
      saveSession(); scrollBottom();
    }
  } else if (msg.type === 'toolResponse' && msg.tool === 'prismfy-search') {
    const b = window._prismfyBubble;
    if (b) {
      b.classList.remove('streaming');
      let text;
      if (msg.result?.error) { text = `⚠️ Prismfy 搜索失败：${msg.result.error}`; }
      else {
        const results = msg.result?.json?.results || msg.result?.json || [];
        if (Array.isArray(results) && results.length) {
          text = `🔎 **多引擎搜索结果**\n\n` + results.slice(0, 8).map(r => `- [${r.title || r.url}](${r.url})\n  ${r.snippet || ''}`).join('\n');
        } else { text = `🔎 **搜索结果**\n\n\`\`\`json\n${JSON.stringify(msg.result?.json, null, 2).slice(0, 2000)}\n\`\`\``; }
      }
      b.innerHTML = renderMarkdown(text);
      window._prismfyBubble = null;
      history.push({ role: 'assistant', content: text }); saveSession(); scrollBottom();
    }
  } else if (msg.type === 'toolResponse' && msg.tool === 'bilibili-search') {
    const b = window._bilibiliBubble;
    if (b) {
      b.classList.remove('streaming');
      b.innerHTML = renderMarkdown(msg.result || '⚠️ 未返回结果');
      window._bilibiliBubble = null;
      history.push({ role: 'assistant', content: msg.result }); saveSession(); scrollBottom();
    }
  } else if (msg.type === 'toolResponse' && msg.tool === 'exec-skill') {
    // 模式1：agentic loop（Promise 回调）
    if (window._pendingExecs?.[msg.id]) {
      window._pendingExecs[msg.id](msg.result);
      delete window._pendingExecs[msg.id];
    }
    // 模式2：slash command（UI 气泡更新）
    const entry = (window._execBubbles || {})[msg.id];
    if (entry) {
      const { bubble, type } = entry;
      bubble.classList.remove('streaming');
      delete window._execBubbles[msg.id];
      const { stdout, stderr, error } = msg.result || {};
      let text;
      if (error && !stdout) { text = `⚠️ 执行失败：${error}\n${stderr || ''}`; }
      else {
        const out = (stdout || '').trim() || stderr || '（无输出）';
        const icons = { excel: '📗', word: '📘', spotify: '🎵', obsidian: '💎', mcp: '📦', 'skill-finder': '🔍', email: '📧', file: '📄' };
        const icon = icons[type] || '⚡';
        try {
          if (type === 'excel') {
            const json = JSON.parse(out);
            const sheets = Object.keys(json);
            text = sheets.map(s => {
              const rows = json[s];
              if (!rows.length) return `**${s}**：（空）`;
              const header = rows[0].join(' | ');
              const sep = rows[0].map(() => '---').join(' | ');
              const body = rows.slice(1).map(r => r.join(' | ')).join('\n');
              return `**Sheet: ${s}**\n\n| ${header} |\n| ${sep} |\n${rows.slice(1).map(r => '| ' + r.join(' | ') + ' |').join('\n')}`;
            }).join('\n\n');
          } else { text = `${icon} **结果**\n\n\`\`\`\n${out.slice(0, 3000)}\n\`\`\``; }
        } catch { text = `${icon} **结果**\n\n\`\`\`\n${out.slice(0, 3000)}\n\`\`\``; }
      }
      bubble.innerHTML = renderMarkdown(text);
      history.push({ role: 'assistant', content: text }); saveSession(); scrollBottom();
    }
  }
});

const cmdPopup = document.getElementById('cmd-popup');

function showCmdPopup(query) {
  const q = query.toLowerCase();
  const filtered = SLASH_COMMANDS.filter(c => c.cmd.includes(q) || c.desc.includes(q) || q === '/');
  if (filtered.length === 0) { hideCmdPopup(); return; }
  if (cmdSelectedIndex >= filtered.length) cmdSelectedIndex = 0;
  cmdPopupOpen = true;
  cmdPopup.innerHTML = filtered.map((c, i) =>
    `<div class="cmd-item${i === cmdSelectedIndex ? ' selected' : ''}" data-prompt="${escapeHtml(c.prompt)}">
      <span class="cmd-name">${c.cmd}</span><span>${c.icon}</span><span class="cmd-desc">${c.desc}</span>
    </div>`
  ).join('');
  cmdPopup.querySelectorAll('.cmd-item').forEach(item => {
    item.addEventListener('mousedown', e => { e.preventDefault(); selectCmd(item.dataset.prompt); });
  });
  cmdPopup.style.display = 'block';
}
function hideCmdPopup() {
  cmdPopupOpen = false; cmdSelectedIndex = 0;
  cmdPopup.style.display = 'none';
}
function selectCmd(prompt) {
  const val = inputEl.value;
  const slashIdx = val.lastIndexOf('/');
  inputEl.value = slashIdx !== -1 ? val.slice(0, slashIdx) + prompt : prompt;
  inputEl.dispatchEvent(new Event('input'));
  inputEl.focus(); hideCmdPopup();
}

const inputEl = document.getElementById('input');
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  const val = inputEl.value;
  const slashIdx = val.lastIndexOf('/');
  if (slashIdx !== -1 && (slashIdx === 0 || val[slashIdx - 1] === '\n')) {
    showCmdPopup(val.slice(slashIdx));
  } else {
    hideCmdPopup();
  }
});
inputEl.addEventListener('keydown', e => {
  if (cmdPopupOpen) {
    const items = cmdPopup.querySelectorAll('.cmd-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      cmdSelectedIndex = (cmdSelectedIndex + 1) % items.length;
      items.forEach((el, i) => el.classList.toggle('selected', i === cmdSelectedIndex));
      items[cmdSelectedIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      cmdSelectedIndex = (cmdSelectedIndex - 1 + items.length) % items.length;
      items.forEach((el, i) => el.classList.toggle('selected', i === cmdSelectedIndex));
      items[cmdSelectedIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Tab' || e.key === 'Enter') {
      e.preventDefault();
      const sel = items[cmdSelectedIndex];
      if (sel) selectCmd(sel.dataset.prompt);
    } else if (e.key === 'Escape') {
      hideCmdPopup();
    }
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function isCodeFile(name) {
  return /\.(js|ts|jsx|tsx|py|java|c|cpp|h|go|rs|rb|php|cs|html|css|json|md|sh|sql|vue|yaml|yml|xml|txt)$/i.test(name);
}
function getLangFromName(name) {
  const m = {js:'javascript',ts:'typescript',jsx:'javascript',tsx:'typescript',py:'python',java:'java',c:'c',cpp:'cpp',h:'c',go:'go',rs:'rust',rb:'ruby',php:'php',cs:'csharp',html:'html',css:'css',json:'json',md:'markdown',sh:'bash',sql:'sql',vue:'vue',yaml:'yaml',yml:'yaml',xml:'xml'};
  return m[name.split('.').pop().toLowerCase()] || 'text';
}
function readCodeFile(file) {
  const reader = new FileReader();
  reader.onload = ev => setPendingContext(file.name, ev.target.result, getLangFromName(file.name));
  reader.readAsText(file, 'utf-8');
}

async function sendMessage() {
  if (!apiKey) { showSetup(); return; }
  const text = inputEl.value.trim();
  if (!text && !pendingImages.length && !pendingContext) return;

  // Intercept /查看记录 command
  if (text === '/查看记录') {
    inputEl.value = '';
    const learnings = getLearnings();
    const bubble = addAIMessage();
    bubble.classList.remove('streaming');
    if (!learnings.length) {
      bubble.innerHTML = renderMarkdown('📚 暂无记录的经验。');
    } else {

      || text.match(/^(?:在|去)?百度上?(?:搜索?|查|找)[一下]?\s*(.+?)$/u);
    if (baiduMatch) {
      const query = (baiduMatch[1] || '').trim();
      if (query && query.length > 1) {

        addUserMessage(text);

        bubble.innerHTML = renderMarkdown(`🔍 正在百度搜索：**${escapeHtml(query)}**...`);
        vscode.postMessage({ type: 'tool', tool: 'baidu-search', query, apiKey: baiduKey });
        window._baiduBubble = bubble;
        scrollBottom(); return;
      }
    }
  }

  // 自然语言：Prismfy多引擎搜索
  {
    const prismfyMatch = text.match(/^(?:帮我去?|用)?prismfy(?:搜索?|查|找)[一下]?\s*(.+?)$/u)
      || text.match(/^(?:用|在)?多引擎(?:搜索?|查|找)[一下]?\s*(.+?)$/u);
    if (prismfyMatch) {
      const query = (prismfyMatch[1] || '').trim();
      if (query && query.length > 1) {
        if (!prismfyKey) {
          const b = addAIMessage(); b.classList.remove('streaming');
          b.innerHTML = renderMarkdown('🔑 **需要先配置 Prismfy API Key**\n\n输入：`/prismfy-key your_key`');
          scrollBottom(); return;
        }

        addUserMessage(text);
        const bubble = addAIMessage();
        bubble.innerHTML = renderMarkdown(`🔎 正在多引擎搜索：**${escapeHtml(query)}**...`);
        vscode.postMessage({ type: 'tool', tool: 'prismfy-search', query, apiKey: prismfyKey });
        window._prismfyBubble = bubble;
        scrollBottom(); return;
      }
    }
  }

  // 自然语言：找广告素材
  {
    const adMatch = text.match(/^(?:帮我?|请)?(?:找|搜索|查)[一下]?(.+?)(?:的)?(?:广告)?素材$/u)
      || text.match(/^(?:广告)?素材(?:搜索?|找|查)[一下]?\s*(.+?)$/u);
    if (adMatch) {
      const query = (adMatch[1] || adMatch[2] || '').trim();
      if (query && query.length > 1) {
        if (!admapixKey) { const b = addAIMessage(); admapixSetupMsg(b); scrollBottom(); return; }
        inputEl.value = '';
        addUserMessage(text);
        const bubble = addAIMessage();
        bubble.innerHTML = renderMarkdown(`🎯 正在搜索 **${escapeHtml(query)}** 的广告素材...`);
        vscode.postMessage({ type: 'tool', tool: 'admapix-search', keyword: query, apiKey: admapixKey });
        window._admapixBubble = bubble;
        scrollBottom(); return;
      }
    }
  }

  // 自然语言：广告分析
  {
    const analysisMatch = text.match(/^(?:帮我?|请)?(?:分析|研究)[一下]?(.+?)(?:的)?(?:广告策略?|投放策略|推广策略)$/u)
      || text.match(/^(.+?)的(?:广告|投放|推广)(?:策略)?分析$/u);
    if (analysisMatch) {
      const appName = (analysisMatch[1] || analysisMatch[2] || '').trim();
      if (appName && appName.length > 1) {
        if (!admapixKey) { const b = addAIMessage(); admapixSetupMsg(b); scrollBottom(); return; }
        inputEl.value = '';
        addUserMessage(text);
        const bubble = addAIMessage();
        bubble.innerHTML = renderMarkdown(`📊 正在深度分析 **${escapeHtml(appName)}** 的广告策略，预计需要 1~3 分钟...`);
        vscode.postMessage({ type: 'tool', tool: 'admapix-deep', query: appName, apiKey: admapixKey });
        window._admapixBubble = bubble;
        scrollBottom(); return;
      }
    }
  }

  // 自然语言：画图
  {
    const drawMatch = text.match(/^(?:帮我?|请)?画[一张]?图[：:]?\s*(.+?)$/u)
      || text.match(/^(?:帮我?|请)?生成[一张]?(?:图片?|图像)[：:]?\s*(.+?)$/u)
      || text.match(/^(?:AI|ai)?画[一下]?\s*(.+?)$/u);
    if (drawMatch) {
      const prompt = (drawMatch[1] || drawMatch[2] || drawMatch[3] || '').trim();
      if (prompt && prompt.length > 2) {
        const geminiKey = localStorage.getItem('gemini_api_key');
        if (!geminiKey) {
          const b = addAIMessage(); b.classList.remove('streaming');
          b.innerHTML = renderMarkdown('🔑 **需要先配置 Gemini API Key**\n\n输入：`/gemini-key your_key`');
          scrollBottom(); return;
        }
        inputEl.value = '';
        addUserMessage(text);
        const bubble = addAIMessage();
        bubble.innerHTML = renderMarkdown(`🎨 正在生成图片：**${escapeHtml(prompt)}**...`);
        vscode.postMessage({ type: 'tool', tool: 'generate-image', prompt, resolution: '1K', apiKey: geminiKey });
        window._imageBubble = bubble;
        scrollBottom(); return;
      }
    }
  }

  // 自然语言：浏览网页
  {
    const browseMatch = text.match(/^(?:帮我?|请)?(?:打开|访问|浏览)[一下]?\s*(https?:\/\/\S+)$/u)
      || text.match(/^(?:看看|查看)\s*(https?:\/\/\S+)(?:的内容)?$/u);
    if (browseMatch) {
      const url = (browseMatch[1] || browseMatch[2] || '').trim();
      if (url) {
        inputEl.value = '';
        addUserMessage(text);
        const bubble = addAIMessage();
        bubble.textContent = '🌐 正在加载页面...';
        vscode.postMessage({ type: 'tool', tool: 'browse', url });
        window._browseBubble = bubble;
        scrollBottom(); return;
      }
    }
  }

  // Init session
  if (!currentSessionId) currentSessionId = Date.now().toString();

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Build user content parts
  const contentParts = [];
  if (autoCtx) {
    contentParts.push({
      type: 'text',
      text: `\`\`\`${autoCtx.lang}\n// ${autoCtx.label}\n${autoCtx.code}\n\`\`\``
    });
  }
  if (pendingContext) {
    contentParts.push({
      type: 'text',
      text: `\`\`\`${pendingContext.lang}\n// 文件: ${pendingContext.label}\n${pendingContext.code}\n\`\`\``
    });
  }
  for (const img of pendingImages) {
    contentParts.push({ type: 'image_url', image_url: { url: img.dataUrl } });
  }
  if (text) contentParts.push({ type: 'text', text });

  const userContent = contentParts.length === 1 && contentParts[0].type === 'text'
    ? contentParts[0].text
    : contentParts;

  // Show user message
  const userImages = [...pendingImages];
  const userCtx = pendingContext;
  const sentAutoCtx = autoCtx;
  addUserMessage(text, userImages, userCtx, sentAutoCtx);

  // Clear input
  inputEl.value = '';
  inputEl.style.height = 'auto';
  pendingImages = [];
  pendingContext = null;
  renderPreviewArea();

  // Add to history
  history.push({ role: 'user', content: userContent });

  // Stream response
  const aiEl = addAIMessage();
  await streamResponse(aiEl);
}

function addUserMessage(text, images, ctx, aCtx) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';

  let bubble = '';
  if (aCtx) {
    const langShort = (aCtx.lang || 'txt').slice(0, 4).toUpperCase();
    bubble += `<div class="context-block"><div class="context-header"><span style="font-family:monospace;background:rgba(34,197,94,0.15);border-radius:3px;padding:0 4px;font-size:9px;color:#4ade80">${escapeHtml(langShort)}</span> ${escapeHtml(aCtx.label)}</div><code>${escapeHtml(aCtx.code.slice(0, 500))}${aCtx.code.length > 500 ? '\n...' : ''}</code></div>`;
  }
  if (ctx) {
    bubble += `<div class="context-block"><div class="context-header">📎 ${escapeHtml(ctx.label)}</div><code>${escapeHtml(ctx.code.slice(0, 500))}${ctx.code.length > 500 ? '\n...' : ''}</code></div>`;
  }
  for (const img of (images || [])) {
    bubble += `<img src="${img.dataUrl}">`;
  }
  if (text) bubble += escapeHtml(text).replace(/\n/g, '<br>');

  const msgIndex = history.length;
  div.innerHTML = `
    <div class="msg-avatar">⭐</div>
    <div class="msg-content">
      <div class="msg-bubble">${bubble}</div>
      <div class="msg-meta"><div class="msg-time">${timeStr()}</div><button class="msg-retry" title="重新发送" onclick="retryMessage(${msgIndex})">↺</button></div>
    </div>`;
  msgs.appendChild(div);
  scrollBottom();
}

async function evaluateLearning(userMsg, aiResponse) {
  if (!apiKey || !userMsg || !aiResponse) return;
  if (typeof userMsg !== 'string' || userMsg.startsWith('/')) return;
  const prompt =
    `分析以下对话，判断是否出现了需要记录的内容：用户纠正AI错误、发现非显然解决方案、AI知识有误、重要项目约定等。\n` +
    `用户：${userMsg.slice(0, 300)}\nAI：${aiResponse.slice(0, 500)}\n` +
    `需要记录则返回JSON：{"log":true,"type":"correction|insight|error|convention","summary":"一句话摘要不超过40字"}\n` +
    `不需要则只返回：{"log":false}\n只输出JSON，不要其他任何文字。`;
  try {
    const res = await fetch(`${baseURL}/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'Qwen/Qwen2.5-7B-Instruct',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 120,
        temperature: 0
      })
    });
    if (!res.ok) return;
    const data = await res.json();
    const raw = (data.choices?.[0]?.message?.content || '').replace(/```json\n?|\n?```/g, '').trim();
    const json = JSON.parse(raw);
    if (json.log && json.summary) {
      saveLearning({ type: json.type || 'insight', summary: json.summary, time: new Date().toISOString() });
      showToast('📌 已记录一条经验');
    }
  } catch {}
}

async function streamResponse(el, _toolIteration = 0) {
  isStreaming = true;
  sendBtn.innerHTML = '■';
  sendBtn.classList.add('stop');
  sendBtn.title = '停止';
  setStatus('思考中...', 'thinking');

  abortCtrl = new AbortController();
  let fullText = '';
  let usage = null;
  let rafPending = false;

  try {
    const model = modelSelect.value;
    const provider = PROVIDERS[currentProvider];
    const apiURL = provider.baseURL + provider.chatPath;
    
    // 按 token 估算截断历史（中文约2字/token，英文约4字/token，取平均3字/token）
    const MAX_HIST_TOKENS = 60000;
    let histTokens = 0, histStart = history.length;
    for (let i = history.length - 1; i >= 0; i--) {
      const c = history[i].content;
      const len = typeof c === 'string' ? c.length : JSON.stringify(c).length;
      histTokens += Math.ceil(len / 3);
      if (histTokens > MAX_HIST_TOKENS) break;
      histStart = i;
    }
    const trimmedHistory = history.slice(histStart);
    const body = {
      model,
      messages: [
        { role: 'system', content: SYSTEM_PROMPT + buildLearningsPrompt() + buildOntologyPrompt((() => { const c = trimmedHistory[trimmedHistory.length - 1]?.content; return Array.isArray(c) ? c.map(x => x.text || '').join(' ') : (c || ''); })()) },
        ...trimmedHistory
      ],
      stream: true,
      max_tokens: 4096,
      temperature: 0.7,
    };

    const res = await fetch(apiURL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify(body),
      signal: abortCtrl.signal
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const evt = JSON.parse(raw);
          const delta = evt.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            if (!rafPending) {
              rafPending = true;
              requestAnimationFrame(() => {
                el.innerHTML = renderMarkdown(fullText);
                scrollBottom();
                rafPending = false;
              });
            }
          }
          if (evt.usage) usage = evt.usage;
        } catch {}
      }
    }

  } catch (err) {
    if (err.name === 'AbortError') {
      fullText += '\n\n*(已停止)*';
      el.innerHTML = renderMarkdown(fullText);
    } else {
      el.innerHTML = `<span style="color:var(--red)">⚠️ ${escapeHtml(err.message)}</span>`;
      setStatus('出错了', 'error');
      isStreaming = false;
      sendBtn.innerHTML = '↑';
      sendBtn.classList.remove('stop');
      sendBtn.title = '发送';
      history.pop();
      return;
    }
  }

  el.classList.remove('streaming');
  // Update model info: remove "思考中"
  const modelInfoEl = el.parentElement?.querySelector('.msg-model');
  if (modelInfoEl) modelInfoEl.textContent = getModelShortName(modelSelect.value);

  // ── Tool-use loop ──
  const toolCalls = [...fullText.matchAll(/<tool name="exec">([\s\S]*?)<\/tool>/g)];
  if (toolCalls.length > 0 && _toolIteration < MAX_TOOL_ITER) {
    history.push({ role: 'assistant', content: fullText });
    el.innerHTML = renderMarkdown(fullText) +
      '<div style="margin-top:8px;color:var(--muted);font-size:12px">⚙️ 正在执行工具...</div>';

    const results = [];
    const failedTools = [];
    for (const match of toolCalls) {
      const cmd = match[1].trim();
      let result;
      try { result = await execSkillAsync(cmd); } catch (e) { result = { error: e.message }; }
      const stdout = (result?.stdout || '').trim();
      const stderr = (result?.stderr || '').trim();
      const error = (result?.error || '').trim();
      const failed = !stdout && (stderr || error);
      if (failed) failedTools.push({ cmd, reason: (stderr || error).slice(0, 300) });
      const out = stdout || stderr || error || '（无输出）';
      results.push(`<result cmd="${cmd.replace(/&/g,'&amp;').replace(/</g,'&lt;')}" status="${failed ? 'error' : 'ok'}">\n${out.slice(0, 2000)}\n</result>`);
    }

    // 工具执行失败时直接停止，不让模型继续编造
    if (failedTools.length > 0) {
      el.classList.remove('streaming');
      const errLines = failedTools.map(f =>
        `❌ **工具执行失败**\n\`\`\`\n${f.cmd.slice(0, 120)}\n\`\`\`\n错误：${f.reason}`
      ).join('\n\n');
      const stopMsg = errLines + '\n\n> 工具执行失败，已停止。请检查环境配置，或换一种方式获取信息。';
      el.innerHTML = renderMarkdown(stopMsg);
      history.push({ role: 'assistant', content: stopMsg });
      saveSession(); scrollBottom();
      isStreaming = false; abortCtrl = null;
      sendBtn.innerHTML = '↑'; sendBtn.classList.remove('stop'); sendBtn.title = '发送 (Enter)';
      setStatus('就绪');
      return;
    }

    history.push({ role: 'user', content: results.join('\n') + '\n\n请严格根据以上工具返回的真实内容回答，不得补充、推测或编造任何工具未返回的信息。如果内容不足以回答，直接说"信息不足"。' });
    const nextEl = addAIMessage();
    await streamResponse(nextEl, _toolIteration + 1);
    // 收尾由递归的最后一轮负责，这里只做清理
    isStreaming = false;
    abortCtrl = null;
    sendBtn.innerHTML = '↑';
    sendBtn.classList.remove('stop');
    sendBtn.title = '发送 (Enter)';
    setStatus('就绪');
    return;
  }

  history.push({ role: 'assistant', content: fullText });
  saveSession();

  // 异步评估是否有值得记录的经验（不阻塞主流程）
  const lastUserMsg = history.length >= 2 ? history[history.length - 2]?.content : '';
  if (typeof lastUserMsg === 'string') evaluateLearning(lastUserMsg, fullText);

  if (usage) {
    totalTokens += (usage.total_tokens || 0);
    document.getElementById('token-count').textContent = `${totalTokens} tokens`;
  }

  isStreaming = false;
  abortCtrl = null;
  sendBtn.innerHTML = '↑';
  sendBtn.classList.remove('stop');
  sendBtn.title = '发送 (Enter)';
  setStatus('就绪');
  scrollBottom();
}

function retryMessage(msgIndex) {
  if (isStreaming) return;
  // 找到这条用户消息在 history 中的位置（msgIndex 是发送时的 history.length）
  // 截断 history 到该消息（含），重新发送
  const targetIdx = Math.min(msgIndex, history.length - 1);
  if (targetIdx < 0 || history[targetIdx]?.role !== 'user') return;
  history = history.slice(0, targetIdx + 1);
  // 删除页面上这条消息之后的所有 AI 消息
  const msgs = document.getElementById('messages');
  const allMsgs = [...msgs.querySelectorAll('.msg')];
  // 找到第 (targetIdx) 个用户消息气泡（0-indexed）
  let userCount = 0;
  let cutFrom = -1;
  allMsgs.forEach((el, i) => {
    if (el.classList.contains('user')) {
      if (userCount === targetIdx) cutFrom = i + 1;
      userCount++;
    }
  });
  if (cutFrom >= 0) {
    allMsgs.slice(cutFrom).forEach(el => el.remove());
  }
  const aiEl = addAIMessage();
  streamResponse(aiEl);
}

// ── Markdown renderer ──
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    if (lang === 'diff') {
      const lines = code.trimEnd().split('\n').map(line => {
        if (line.startsWith('+')) return `<span class="diff-add">${escapeHtml(line)}</span>`;
        if (line.startsWith('-')) return `<span class="diff-del">${escapeHtml(line)}</span>`;
        if (line.startsWith('@@')) return `<span class="diff-meta">${escapeHtml(line)}</span>`;
        return escapeHtml(line);
      }).join('\n');
      return `<pre><div class="code-header"><span>diff</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><code class="language-diff">${lines}</code></pre>`;
    }
    const escaped = escapeHtml(code.trimEnd());
    return `<pre><div class="code-header"><span>${lang || 'code'}</span><div style="display:flex;gap:4px"><button class="copy-btn apply-btn" onclick="applyCode(this)" title="写入当前编辑器">应用</button><button class="copy-btn" onclick="copyCode(this)">复制</button></div></div><code class="language-${lang}">${escaped}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`);
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Blockquote
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // HR
  text = text.replace(/^---+$/gm, '<hr>');
  // Lists
  text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Links (only allow http/https to prevent javascript: injection)
  text = text.replace(/\[(.+?)\]\((.+?)\)/g, (_, label, url) => {
    const safe = /^https?:\/\//i.test(url) ? url : '#';
    return `<a href="${escapeHtml(safe)}" target="_blank">${label}</a>`;
  });
  // Line breaks (not inside tags)
  text = text.replace(/\n\n/g, '</p><p>');
  text = text.replace(/\n/g, '<br>');
  text = `<p>${text}</p>`;
  // Clean up empty paragraphs
  text = text.replace(/<p><\/p>/g, '');
  text = text.replace(/<p>(<(?:pre|ul|ol|h[1-6]|blockquote|hr))/g, '$1');
  text = text.replace(/(<\/(?:pre|ul|ol|h[1-6]|blockquote|hr)>)<\/p>/g, '$1');
  return text;
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}
function applyCode(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  vscode.postMessage({ type: 'applyCode', code });
  btn.textContent = '✓';
  setTimeout(() => btn.textContent = '应用', 2000);
}

// ── Utils ──
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function timeStr() {
  return new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
}
function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}
function setStatus(text, state = 'ok') {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state === 'thinking' ? ' thinking' : state === 'error' ? ' error' : '');
}
function addSystemHint(text) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.style.cssText = 'text-align:center;padding:6px 12px;margin:4px 10px;color:var(--text-muted);font-size:11px;background:var(--bg2);border-radius:8px;border:1px solid var(--border);';
  el.textContent = '⚠ ' + text;
  msgs.appendChild(el);
  scrollBottom();
  setTimeout(() => el.remove(), 4000);
}

// ── Auto-restore last session on page load ──
(function restoreLastSession() {
  const lastId = localStorage.getItem('vsc_last_session_id');
  if (lastId && sessions.find(s => s.id === lastId)) {
    loadSession(lastId);
  } else {
    renderDrawerList();
  }
})();

// ── 初始化 Header 头像 ──
document.getElementById('header-avatar').innerHTML = CAT_AVATAR_SVG;

// ── 初始化 Welcome 图标 ──
initWelcomeIcon();
</script>
