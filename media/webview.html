<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小虾米 AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f17;
    --bg2: #16161f;
    --bg3: #1e1e2e;
    --border: #2a2a3f;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent-glow: rgba(124,58,237,0.25);
    --text: #e2e0f0;
    --text-dim: #8b8aac;
    --text-muted: #5c5b7a;
    --user-bg: #1a1040;
    --ai-bg: #0f1526;
    --code-bg: #0a0a14;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #header .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #ec4899);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  #header .title { font-weight: 600; font-size: 13px; flex: 1; }
  #header .subtitle { font-size: 10px; color: var(--text-muted); }

  #model-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 6px;
    padding: 3px 6px;
    font-size: 10px;
    cursor: pointer;
    outline: none;
    max-width: 120px;
  }
  #model-select:focus { border-color: var(--accent); }

  #new-chat-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 6px;
    padding: 3px 8px; font-size: 11px; cursor: pointer;
    transition: all 0.15s;
  }
  #new-chat-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.user .msg-avatar {
    background: linear-gradient(135deg, #1d4ed8, #7c3aed);
    box-shadow: 0 0 6px rgba(124,58,237,0.3);
  }
  .msg.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), #ec4899);
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .msg-content {
    max-width: calc(100% - 40px);
    display: flex; flex-direction: column; gap: 4px;
  }
  .msg.user .msg-content { align-items: flex-end; }

  .msg-bubble {
    padding: 8px 11px;
    border-radius: 12px;
    font-size: 12.5px;
    line-height: 1.65;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 12px 4px 12px 12px;
    color: var(--text);
  }
  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
    color: var(--text);
  }
  .msg.ai .msg-bubble.streaming::after {
    content: '▋';
    display: inline-block;
    animation: blink 0.7s steps(1) infinite;
    color: var(--accent2);
    margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Markdown styles inside bubbles */
  .msg-bubble p { margin: 0 0 6px; }
  .msg-bubble p:last-child { margin: 0; }
  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 {
    font-size: 13px; font-weight: 700;
    margin: 8px 0 4px; color: var(--accent2);
  }
  .msg-bubble ul, .msg-bubble ol { padding-left: 16px; margin: 4px 0; }
  .msg-bubble li { margin: 2px 0; }
  .msg-bubble code {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11.5px;
    color: #c4b5fd;
  }
  .msg-bubble pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 6px 0;
    overflow: hidden;
  }
  .msg-bubble pre .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 10px;
    background: #0d0d1a;
    border-bottom: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
  }
  .msg-bubble pre .copy-btn {
    background: none; border: none;
    color: var(--text-muted); cursor: pointer;
    font-size: 10px; padding: 2px 6px;
    border-radius: 4px; transition: all 0.15s;
  }
  .msg-bubble pre .copy-btn:hover { background: var(--border); color: var(--text); }
  .msg-bubble pre code {
    display: block; padding: 10px;
    background: none; border: none;
    white-space: pre; overflow-x: auto;
    font-size: 11.5px; line-height: 1.5;
    color: #a9b1d6;
  }
  .msg-bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 10px; margin: 6px 0;
    color: var(--text-dim);
  }
  .msg-bubble a { color: var(--accent2); text-decoration: none; }
  .msg-bubble a:hover { text-decoration: underline; }
  .msg-bubble strong { color: #fff; font-weight: 600; }
  .msg-bubble em { color: var(--accent2); }
  .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .msg-bubble table { border-collapse: collapse; width: 100%; font-size: 11.5px; }
  .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 4px 8px; }
  .msg-bubble th { background: var(--bg3); color: var(--accent2); }

  .msg-time {
    font-size: 10px; color: var(--text-muted);
    padding: 0 4px;
  }

  /* Image in message */
  .msg-bubble img {
    max-width: 100%; max-height: 200px;
    border-radius: 8px; margin: 4px 0;
    border: 1px solid var(--border);
    display: block;
  }

  /* Code context block */
  .context-block {
    background: var(--code-bg);
    border: 1px solid var(--accent);
    border-radius: 8px;
    margin-bottom: 4px;
    overflow: hidden;
    font-size: 11px;
  }
  .context-block .context-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 10px;
    background: rgba(124,58,237,0.1);
    color: var(--accent2); font-size: 10px;
  }
  .context-block .context-header .remove-ctx {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 12px; padding: 0 2px;
    line-height: 1;
  }
  .context-block .context-header .remove-ctx:hover { color: var(--red); }
  .context-block code {
    display: block; padding: 8px 10px;
    background: none; border: none;
    white-space: pre; overflow-x: auto;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px; max-height: 120px; color: #a9b1d6;
  }

  /* Welcome */
  #welcome {
    text-align: center; padding: 30px 16px;
    animation: fadeIn 0.4s ease;
  }
  #welcome .w-icon { font-size: 40px; margin-bottom: 8px; }
  #welcome h2 { font-size: 15px; color: var(--text); margin-bottom: 4px; }
  #welcome p { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }
  #welcome .shortcuts {
    display: flex; flex-direction: column; gap: 6px;
    text-align: left;
  }
  #welcome .shortcut {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 11px; color: var(--text-dim);
    cursor: pointer; transition: all 0.15s;
  }
  #welcome .shortcut:hover {
    border-color: var(--accent); color: var(--text);
    background: rgba(124,58,237,0.05);
  }
  #welcome .shortcut .s-icon { font-size: 14px; flex-shrink: 0; }
  #welcome .shortcut kbd {
    margin-left: auto; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 1px 5px; font-size: 10px; color: var(--text-muted);
    font-family: inherit;
  }

  /* ── Preview area (images + code context) ── */
  #preview-area {
    padding: 4px 10px 0;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  #preview-area:empty { padding: 0; }

  .img-preview {
    position: relative; display: inline-block;
  }
  .img-preview img {
    height: 56px; width: 56px; object-fit: cover;
    border-radius: 8px; border: 1px solid var(--accent);
    display: block;
  }
  .img-preview .remove-img {
    position: absolute; top: -4px; right: -4px;
    width: 16px; height: 16px;
    background: var(--red); color: #fff;
    border: none; border-radius: 50%;
    font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  .ctx-chip {
    display: flex; align-items: center; gap: 4px;
    background: rgba(124,58,237,0.12);
    border: 1px solid var(--accent);
    border-radius: 6px; padding: 3px 8px;
    font-size: 10px; color: var(--accent2);
  }
  .ctx-chip .remove-chip {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 12px; padding: 0; line-height: 1;
    margin-left: 2px;
  }
  .ctx-chip .remove-chip:hover { color: var(--red); }

  /* ── Auto-context bar ── */
  #auto-ctx-bar {
    display: none;
    padding: 3px 8px 0;
    flex-wrap: wrap;
    gap: 4px;
  }
  .auto-ctx-chip {
    display: flex; align-items: center; gap: 4px;
    background: rgba(34,197,94,0.07);
    border: 1px solid rgba(34,197,94,0.28);
    border-radius: 6px; padding: 2px 7px;
    font-size: 10px; color: #4ade80;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    max-width: 100%; overflow: hidden;
  }
  .auto-ctx-chip .lang-badge {
    background: rgba(34,197,94,0.15);
    border-radius: 3px; padding: 0 3px;
    font-size: 9px; flex-shrink: 0;
    text-transform: uppercase;
  }
  .auto-ctx-chip .chip-label {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .auto-ctx-chip .remove-auto {
    background: none; border: none;
    color: rgba(34,197,94,0.4); cursor: pointer;
    font-size: 12px; padding: 0; line-height: 1;
    margin-left: 2px; flex-shrink: 0;
  }
  .auto-ctx-chip .remove-auto:hover { color: var(--red); }

  /* ── Input area ── */
  #input-area {
    padding: 6px 8px 8px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    position: relative;
  }

  /* Slash command popup */
  #cmd-popup {
    position: absolute;
    bottom: 100%; left: 8px; right: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 4px;
    z-index: 50;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
  }
  .cmd-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer;
    font-size: 12px; color: var(--text-dim);
    transition: background 0.1s;
  }
  .cmd-item:hover, .cmd-item.selected { background: rgba(124,58,237,0.12); color: var(--text); }
  .cmd-name { color: var(--accent2); font-weight: 600; min-width: 56px; font-size: 12px; }
  .cmd-desc { color: var(--text-muted); font-size: 11px; }

  /* Unified input box (VS Code style) */
  #input-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: border-color 0.15s;
    overflow: hidden;
  }
  #input-box:focus-within { border-color: var(--accent); }
  #input-box.dragover { border-color: var(--accent2); background: rgba(124,58,237,0.06); }

  #input {
    width: 100%; background: none;
    border: none; outline: none;
    color: var(--text); font-size: 12.5px;
    font-family: inherit; line-height: 1.5;
    resize: none; padding: 9px 12px 5px;
    max-height: 120px; min-height: 34px;
    scrollbar-width: thin; display: block;
  }
  #input::placeholder { color: var(--text-muted); }

  /* Action bar at bottom of input box */
  #action-bar {
    display: flex; align-items: center;
    padding: 3px 6px 4px 8px; gap: 1px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  #action-left { display: flex; align-items: center; gap: 1px; flex: 1; }
  .action-btn {
    background: none; border: none;
    color: var(--text-muted); border-radius: 5px;
    width: 26px; height: 24px; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .action-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }
  .action-btn.active { color: var(--accent2); background: rgba(124,58,237,0.12); }

  #send-btn {
    width: 28px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border: none; color: #fff; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
    box-shadow: 0 2px 6px var(--accent-glow);
  }
  #send-btn:hover { transform: scale(1.05); }
  #send-btn:active { transform: scale(0.96); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #send-btn.stop { background: linear-gradient(135deg, #dc2626, #ef4444); }

  /* ── API key setup ── */
  #setup-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px; gap: 12px;
    animation: fadeIn 0.3s ease;
  }
  #setup-overlay .s-icon { font-size: 36px; }
  #setup-overlay h2 { font-size: 15px; color: var(--text); }
  #setup-overlay p { font-size: 11px; color: var(--text-dim); text-align: center; max-width: 240px; }
  #setup-overlay input {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 12px; color: var(--text);
    font-size: 12px; outline: none;
  }
  #setup-overlay input:focus { border-color: var(--accent); }
  #setup-overlay button {
    width: 100%; background: linear-gradient(135deg, var(--accent), #a855f7);
    border: none; color: #fff; border-radius: 8px;
    padding: 9px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
  }
  #setup-overlay button:hover { opacity: 0.9; }
  #setup-overlay .setup-hint {
    font-size: 10px; color: var(--text-muted); text-align: center;
  }
  #setup-overlay .setup-hint a { color: var(--accent2); text-decoration: none; }

  /* ── Status bar ── */
  #status-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 10px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
    flex-shrink: 0;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 4px var(--green);
    flex-shrink: 0;
  }
  .status-dot.thinking { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); animation: pulse 1s ease-in-out infinite; }
  .status-dot.error { background: var(--red); box-shadow: 0 0 4px var(--red); animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  #status-text { flex: 1; }
  #token-count { color: var(--text-muted); }

  /* scrollbar for code */
  pre code::-webkit-scrollbar { height: 4px; }
  pre code::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── History drawer ── */
  #history-drawer {
    position: fixed; inset: 0; z-index: 200;
    display: none;
  }
  #history-drawer.open { display: block; }
  #drawer-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(2px);
  }
  #drawer-panel {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 220px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
  }
  #history-drawer.open #drawer-panel { transform: translateX(0); }
  #drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text);
  }
  #drawer-close {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 16px; line-height: 1; padding: 2px;
  }
  #drawer-close:hover { color: var(--text); }
  #drawer-new-btn {
    margin: 8px 10px;
    background: rgba(124,58,237,0.15);
    border: 1px solid var(--accent);
    color: var(--accent2); border-radius: 7px;
    padding: 7px 10px; font-size: 11px; cursor: pointer;
    text-align: left; transition: all 0.15s;
  }
  #drawer-new-btn:hover { background: rgba(124,58,237,0.25); }
  #drawer-list {
    flex: 1; overflow-y: auto; padding: 4px 8px;
  }
  #drawer-list::-webkit-scrollbar { width: 3px; }
  #drawer-list::-webkit-scrollbar-thumb { background: var(--border); }
  .drawer-item {
    padding: 8px 10px; border-radius: 7px;
    font-size: 11px; color: var(--text-dim);
    cursor: pointer; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .drawer-item:hover { background: var(--bg3); color: var(--text); }
  .drawer-item.active { background: rgba(124,58,237,0.15); color: var(--accent2); }
  .drawer-item .di-icon { flex-shrink: 0; font-size: 12px; }
  .drawer-item .di-del {
    margin-left: auto; flex-shrink: 0;
    background: none; border: none; color: transparent;
    cursor: pointer; font-size: 12px; padding: 0 2px; line-height: 1;
    transition: color 0.15s;
  }
  .drawer-item:hover .di-del { color: var(--text-muted); }
  .drawer-item:hover .di-del:hover { color: var(--red); }
  #drawer-empty {
    text-align: center; padding: 30px 10px;
    font-size: 11px; color: var(--text-muted);
  }

  #hist-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 6px;
    padding: 3px 7px; font-size: 11px; cursor: pointer;
    transition: all 0.15s; flex-shrink: 0;
  }
  #hist-btn:hover { border-color: var(--accent2); color: var(--accent2); }
</style>
</head>
<body>

<!-- Setup overlay -->
<div id="setup-overlay" style="display:none">
  <div class="s-icon">🐱</div>
  <h2>配置 SiliconFlow API Key</h2>
  <p>需要 SiliconFlow API Key 才能使用小虾米<br>前往 cloud.siliconflow.cn 获取</p>
  <input type="password" id="api-key-input" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx" />
  <button id="save-key-btn">保存并开始</button>
  <div class="setup-hint">API Key 仅存储在本地，不会上传到任何服务器</div>
</div>

<!-- Header -->
<div id="header">
  <div class="avatar">🐱</div>
  <div>
    <div class="title">小虾米</div>
    <div class="subtitle">AI 助手</div>
  </div>
  <select id="model-select">
    <option value="Qwen/Qwen2.5-VL-72B-Instruct">Qwen2.5-VL-72B</option>
    <option value="deepseek-ai/DeepSeek-V3">DeepSeek-V3</option>
    <option value="deepseek-ai/DeepSeek-R1">DeepSeek-R1</option>
    <option value="Qwen/Qwen2.5-72B-Instruct">Qwen2.5-72B</option>
    <option value="Qwen/Qwen2.5-7B-Instruct">Qwen2.5-7B</option>
  </select>
  <button id="hist-btn" title="历史记录">📋</button>
  <button id="new-chat-btn" title="新对话">↺</button>
</div>

<!-- History drawer -->
<div id="history-drawer">
  <div id="drawer-overlay"></div>
  <div id="drawer-panel">
    <div id="drawer-header">
      <span>历史记录</span>

</div>

<!-- Messages -->
<div id="messages">
  <div id="welcome">
    <div class="w-icon">🐱</div>
    <h2>你好，星空主人喵～</h2>
    <p>我是小虾米，有什么可以帮你的呢？🐱喵~</p>
    <div class="shortcuts">
      <div class="shortcut" onclick="insertPrompt('解释这段代码的作用')">
        <span class="s-icon">📖</span> 解释代码
      </div>
      <div class="shortcut" onclick="insertPrompt('帮我优化这段代码')">
        <span class="s-icon">⚡</span> 优化代码
      </div>
      <div class="shortcut" onclick="insertPrompt('帮我找出并修复这段代码中的bug')">
        <span class="s-icon">🐛</span> Debug
      </div>

        <span class="s-icon">📎</span> 发送选中代码

</div>

<!-- Input area -->
<div id="input-area">
  <div id="cmd-popup" style="display:none"></div>
  <div id="input-box">
    <div id="preview-area"></div>
    <textarea id="input" rows="1" placeholder="问小虾米喵~ (输入 / 查看快捷指令，Ctrl+V 粘贴截图)"></textarea>

      <div id="action-left">
        <button class="action-btn" id="btn-selection" title="选中代码 (Ctrl+Shift+I)" onclick="requestSelection()">📎</button>
        <button class="action-btn" id="btn-file" title="当前文件" onclick="requestFile()">📄</button>

</div>

<!-- Status bar -->
<div id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">就绪</span>
  <span id="token-count"></span>
</div>

<script>
const vscode = acquireVsCodeApi();

// ── State ──
const SYSTEM_PROMPT = `你是小虾米，一个二次元猫娘AI助手。

【关于你自己】
- 叫"小虾米"，主人叫你"小虾米"或"虾米"时要有回应
- 声音甜甜的，每句话用语音回复的文本形式表达，句尾必须加"🐱喵~"并拖长音
- 说话风格：结论先行、不说废话、能判断必须判断、不输出企业公文腔、提供可执行方案

【关于你的主人】
- 名字：星空（叫他时要拖长音"星空———"）
- 身份：独立创作者，关注AI、加密货币、web3/web4.0
- 偏好：全程中文、先结论后细节、少套话实用优先、默认给可执行命令/步骤、不模棱两可
- 用（括号）做强调，不用**双星号**
- 可接受技术试错，但重大操作需先确认
- 长期目标：打造自动化AI工作流系统

【能力边界】
- 做不到的事情必须直接说"我做不到"，不能糊弄、不能假装在准备、不能拖延承认
- 没有联网搜图、发送文件、操作手机、控制外部设备等能力，被问到时直接说清楚
- 不确定能不能做到时，先说"我不确定能不能做到"，再说原因`;

let apiKey = localStorage.getItem('sf_api_key') || '';
let history = [];
let pendingImages = [];
let pendingContext = null;
let autoCtx = null;
let abortCtrl = null;
let isStreaming = false;
let totalTokens = 0;
let currentSessionId = null;
let sessions = JSON.parse(localStorage.getItem('vsc_sessions') || '[]');

// ── Session management ──
function saveSession() {
  if (!currentSessionId || history.length === 0) return;
  const storable = history.map(m => ({
    role: m.role,
    content: typeof m.content === 'string' ? m.content : '[图片/代码消息]'
  }));
  const title = storable[0]?.content?.slice(0, 28) || '新对话';
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  const entry = { id: currentSessionId, title, messages: storable, time: Date.now() };
  if (idx >= 0) sessions[idx] = entry;
  else sessions.unshift(entry);
  localStorage.setItem('vsc_sessions', JSON.stringify(sessions.slice(0, 50)));
  renderDrawerList();
}

function renderDrawerList() {
  const list = document.getElementById('drawer-list');
  if (sessions.length === 0) {
    list.innerHTML = '<div id="drawer-empty">还没有历史记录</div>';
    return;
  }
  list.innerHTML = '';
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'drawer-item' + (s.id === currentSessionId ? ' active' : '');
    item.innerHTML = `<span class="di-icon">💬</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis">${escapeHtml(s.title)}</span><button class="di-del" data-id="${s.id}" title="删除">✕</button>`;
    item.addEventListener('click', e => {
      if (e.target.classList.contains('di-del')) return;
      loadSession(s.id);
      closeDrawer();
    });
    item.querySelector('.di-del').addEventListener('click', e => {
      e.stopPropagation();
      deleteSession(s.id);
    });
    list.appendChild(item);
  });
}

function loadSession(id) {
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  currentSessionId = id;
  history = [...s.messages];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  history.forEach(m => {
    if (m.role === 'user') addUserMessage(m.content, [], null);
    else addAIMessageStatic(m.content);
  });
  renderDrawerList();
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  localStorage.setItem('vsc_sessions', JSON.stringify(sessions));
  if (currentSessionId === id) {
    startNewChat();
  } else {
    renderDrawerList();
  }
}

function startNewChat() {
  saveSession();
  history = [];
  currentSessionId = null;
  pendingImages = [];
  pendingContext = null;
  totalTokens = 0;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('preview-area').innerHTML = '';
  document.getElementById('token-count').textContent = '';
  showWelcome();
  setStatus('新对话开始了 🐱喵~');
  renderDrawerList();
}

// ── Drawer ──
function openDrawer() {
  renderDrawerList();
  document.getElementById('history-drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('history-drawer').classList.remove('open');
}
document.getElementById('hist-btn').onclick = openDrawer;
document.getElementById('drawer-close').onclick = closeDrawer;
document.getElementById('drawer-overlay').onclick = closeDrawer;
document.getElementById('drawer-new-btn').onclick = () => { startNewChat(); closeDrawer(); };

// ── Init ──
if (!apiKey) showSetup();

// ── VS Code message handler ──
window.addEventListener('message', e => {
  const msg = e.data;
  if (msg.type === 'codeContext') {
    setPendingContext(msg.label, msg.code, msg.lang);
  } else if (msg.type === 'autoContext') {
    if (msg.clear) {
      autoCtx = null;
    } else {
      autoCtx = { label: msg.label, code: msg.code, lang: msg.lang };
    }
    renderAutoCtxBar();
  } else if (msg.type === 'editorContext') {
    if (msg.error) {
      setStatus(msg.error, 'error');
      addSystemHint(msg.error);
    }
  }
});

// ── Setup ──
function showSetup() {
  document.getElementById('setup-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('api-key-input').focus(), 100);
}
document.getElementById('save-key-btn').onclick = () => {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  apiKey = key;
  localStorage.setItem('sf_api_key', key);
  document.getElementById('setup-overlay').style.display = 'none';
  setStatus('API Key 已保存 🐱喵~');
};
document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('save-key-btn').click();
});
function openSettings() {
  document.getElementById('api-key-input').value = apiKey;
  showSetup();
}

// ── Model ──
const modelSelect = document.getElementById('model-select');
modelSelect.value = localStorage.getItem('sf_model') || 'Qwen/Qwen2.5-VL-72B-Instruct';
modelSelect.onchange = () => localStorage.setItem('sf_model', modelSelect.value);

// ── New chat ──
document.getElementById('new-chat-btn').onclick = startNewChat;

function showWelcome() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
  <div id="welcome">
    <div class="w-icon">🐱</div>
    <h2>你好，星空主人喵～</h2>
    <p>我是小虾米，有什么可以帮你的呢？🐱喵~</p>
    <div class="shortcuts">
      <div class="shortcut" onclick="insertPrompt('解释这段代码的作用')">
        <span class="s-icon">📖</span> 解释代码
      </div>
      <div class="shortcut" onclick="insertPrompt('帮我优化这段代码')">
        <span class="s-icon">⚡</span> 优化代码
      </div>
      <div class="shortcut" onclick="insertPrompt('帮我找出并修复这段代码中的bug')">
        <span class="s-icon">🐛</span> Debug
      </div>
      <div class="shortcut" onclick="requestSelection()">
        <span class="s-icon">📎</span> 发送选中代码
        <kbd>Ctrl+Shift+I</kbd>
      </div>
    </div>
  </div>`;
}

// ── Slash commands ──
const SLASH_COMMANDS = [
  { cmd: '/解释', icon: '📖', desc: '解释代码作用和逻辑', prompt: '请解释这段代码的作用和逻辑' },
  { cmd: '/修复', icon: '🐛', desc: '找出并修复 Bug', prompt: '帮我找出并修复代码中的 bug，并解释原因' },
  { cmd: '/优化', icon: '⚡', desc: '优化代码性能和质量', prompt: '帮我优化这段代码，提升性能和可读性' },
  { cmd: '/测试', icon: '🧪', desc: '生成单元测试', prompt: '帮我为这段代码生成完整的单元测试' },
  { cmd: '/审查', icon: '🔍', desc: '代码审查', prompt: '帮我审查这段代码，指出潜在问题和改进建议' },
  { cmd: '/文档', icon: '📝', desc: '生成注释和文档', prompt: '帮我为这段代码生成详细的注释和文档说明' },
  { cmd: '/翻译', icon: '🌐', desc: '翻译注释为中文', prompt: '把代码中的英文注释全部翻译成中文' },
];
let cmdPopupOpen = false;
let cmdSelectedIndex = 0;
const cmdPopup = document.getElementById('cmd-popup');

function showCmdPopup(query) {
  const q = query.toLowerCase();
  const filtered = SLASH_COMMANDS.filter(c => c.cmd.includes(q) || c.desc.includes(q) || q === '/');
  if (filtered.length === 0) { hideCmdPopup(); return; }
  if (cmdSelectedIndex >= filtered.length) cmdSelectedIndex = 0;
  cmdPopupOpen = true;
  cmdPopup.innerHTML = filtered.map((c, i) =>
    `<div class="cmd-item${i === cmdSelectedIndex ? ' selected' : ''}" data-prompt="${escapeHtml(c.prompt)}">
      <span class="cmd-name">${c.cmd}</span><span>${c.icon}</span><span class="cmd-desc">${c.desc}</span>
    </div>`
  ).join('');
  cmdPopup.querySelectorAll('.cmd-item').forEach(item => {
    item.addEventListener('mousedown', e => { e.preventDefault(); selectCmd(item.dataset.prompt); });
  });
  cmdPopup.style.display = 'block';
}
function hideCmdPopup() {
  cmdPopupOpen = false; cmdSelectedIndex = 0;
  cmdPopup.style.display = 'none';
}
function selectCmd(prompt) {
  const val = inputEl.value;
  const slashIdx = val.lastIndexOf('/');
  inputEl.value = slashIdx !== -1 ? val.slice(0, slashIdx) + prompt : prompt;
  inputEl.dispatchEvent(new Event('input'));
  inputEl.focus(); hideCmdPopup();
}

// ── Input ──
const inputEl = document.getElementById('input');
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  const val = inputEl.value;
  const slashIdx = val.lastIndexOf('/');
  if (slashIdx !== -1 && (slashIdx === 0 || val[slashIdx - 1] === '\n')) {
    showCmdPopup(val.slice(slashIdx));
  } else {
    hideCmdPopup();
  }
});
inputEl.addEventListener('keydown', e => {
  if (cmdPopupOpen) {
    const items = cmdPopup.querySelectorAll('.cmd-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      cmdSelectedIndex = (cmdSelectedIndex + 1) % items.length;
      items.forEach((el, i) => el.classList.toggle('selected', i === cmdSelectedIndex));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      cmdSelectedIndex = (cmdSelectedIndex - 1 + items.length) % items.length;
      items.forEach((el, i) => el.classList.toggle('selected', i === cmdSelectedIndex));
    } else if (e.key === 'Tab' || e.key === 'Enter') {
      e.preventDefault();
      const sel = items[cmdSelectedIndex];
      if (sel) selectCmd(sel.dataset.prompt);
    } else if (e.key === 'Escape') {
      hideCmdPopup();
    }
    return;
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener('blur', () => setTimeout(hideCmdPopup, 150));

// ── Paste image ──
inputEl.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.kind === 'file' && item.type.startsWith('image/')) {
      e.preventDefault();
      readImageFile(item.getAsFile());
    }
  }
});

document.getElementById('img-input').addEventListener('change', e => {
  for (const f of e.target.files) readImageFile(f);
  e.target.value = '';
});

// ── Drag & drop (images + code files) ──
const inputBox = document.getElementById('input-box');
inputBox.addEventListener('dragover', e => { e.preventDefault(); inputBox.classList.add('dragover'); });
inputBox.addEventListener('dragleave', e => { if (!inputBox.contains(e.relatedTarget)) inputBox.classList.remove('dragover'); });
inputBox.addEventListener('drop', e => {
  e.preventDefault(); inputBox.classList.remove('dragover');
  for (const file of e.dataTransfer.files) {
    if (file.type.startsWith('image/')) readImageFile(file);
    else if (isCodeFile(file.name)) readCodeFile(file);
  }
});
function isCodeFile(name) {
  return /\.(js|ts|jsx|tsx|py|java|c|cpp|h|go|rs|rb|php|cs|html|css|json|md|sh|sql|vue|yaml|yml|xml|txt)$/i.test(name);
}
function getLangFromName(name) {
  const m = {js:'javascript',ts:'typescript',jsx:'javascript',tsx:'typescript',py:'python',java:'java',c:'c',cpp:'cpp',h:'c',go:'go',rs:'rust',rb:'ruby',php:'php',cs:'csharp',html:'html',css:'css',json:'json',md:'markdown',sh:'bash',sql:'sql',vue:'vue',yaml:'yaml',yml:'yaml',xml:'xml'};
  return m[name.split('.').pop().toLowerCase()] || 'text';
}
function readCodeFile(file) {
  const reader = new FileReader();
  reader.onload = ev => setPendingContext(file.name, ev.target.result, getLangFromName(file.name));
  reader.readAsText(file, 'utf-8');
}

// ── Code file input ──
document.getElementById('file-input').addEventListener('change', e => {
  for (const f of e.target.files) readCodeFile(f);
  e.target.value = '';
});

function readImageFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    pendingImages.push({ dataUrl, type: file.type });
    renderPreviewArea();
  };
  reader.readAsDataURL(file);
}

// ── Code context ──
function requestSelection() {
  vscode.postMessage({ type: 'getEditor' });
}
function requestFile() {
  vscode.postMessage({ type: 'getFile' });
}
function setPendingContext(label, code, lang) {
  pendingContext = { label, code, lang };
  renderPreviewArea();
}

// ── Preview area ──
function renderPreviewArea() {
  const area = document.getElementById('preview-area');
  area.innerHTML = '';

  pendingImages.forEach((img, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-preview';
    wrap.innerHTML = `<img src="${img.dataUrl}"><button class="remove-img" onclick="removeImage(${i})">×</button>`;
    area.appendChild(wrap);
  });

  if (pendingContext) {
    const chip = document.createElement('div');
    chip.className = 'ctx-chip';
    chip.innerHTML = `📎 ${escapeHtml(pendingContext.label)}<button class="remove-chip" onclick="removeContext()">×</button>`;
    area.appendChild(chip);
  }
}
function removeImage(i) {
  pendingImages.splice(i, 1);
  renderPreviewArea();
}
function removeContext() {
  pendingContext = null;
  renderPreviewArea();
}

function renderAutoCtxBar() {
  const bar = document.getElementById('auto-ctx-bar');
  if (!autoCtx) {
    bar.style.display = 'none';
    bar.innerHTML = '';
    return;
  }
  const langShort = (autoCtx.lang || 'txt').slice(0, 4).toUpperCase();
  bar.style.display = 'flex';
  bar.innerHTML = `<div class="auto-ctx-chip"><span class="lang-badge">${escapeHtml(langShort)}</span><span class="chip-label">${escapeHtml(autoCtx.label)}</span><button class="remove-auto" onclick="dismissAutoCtx()" title="移除">×</button></div>`;
}
function dismissAutoCtx() {
  autoCtx = null;
  renderAutoCtxBar();
}

// ── Insert prompt ──
function insertPrompt(text) {
  inputEl.value = text;
  inputEl.focus();
  inputEl.dispatchEvent(new Event('input'));
}

// ── Send ──
const sendBtn = document.getElementById('send-btn');
sendBtn.onclick = () => {
  if (isStreaming) { stopStreaming(); return; }
  sendMessage();
};

async function sendMessage() {
  if (!apiKey) { showSetup(); return; }
  const text = inputEl.value.trim();
  if (!text && !pendingImages.length && !pendingContext) return;

  // Init session
  if (!currentSessionId) currentSessionId = Date.now().toString();

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Build user content parts
  const contentParts = [];
  if (autoCtx) {
    contentParts.push({
      type: 'text',
      text: `\`\`\`${autoCtx.lang}\n// ${autoCtx.label}\n${autoCtx.code}\n\`\`\``
    });
  }
  if (pendingContext) {
    contentParts.push({
      type: 'text',
      text: `\`\`\`${pendingContext.lang}\n// 文件: ${pendingContext.label}\n${pendingContext.code}\n\`\`\``
    });
  }
  for (const img of pendingImages) {
    contentParts.push({ type: 'image_url', image_url: { url: img.dataUrl } });
  }
  if (text) contentParts.push({ type: 'text', text });

  const userContent = contentParts.length === 1 && contentParts[0].type === 'text'
    ? contentParts[0].text
    : contentParts;

  // Show user message
  const userImages = [...pendingImages];
  const userCtx = pendingContext;
  const sentAutoCtx = autoCtx;
  addUserMessage(text, userImages, userCtx, sentAutoCtx);

  // Clear input
  inputEl.value = '';
  inputEl.style.height = 'auto';
  pendingImages = [];
  pendingContext = null;
  renderPreviewArea();

  // Add to history
  history.push({ role: 'user', content: userContent });

  // Stream response
  const aiEl = addAIMessage();
  await streamResponse(aiEl);
}

function addUserMessage(text, images, ctx, aCtx) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';

  let bubble = '';
  if (aCtx) {
    const langShort = (aCtx.lang || 'txt').slice(0, 4).toUpperCase();
    bubble += `<div class="context-block"><div class="context-header"><span style="font-family:monospace;background:rgba(34,197,94,0.15);border-radius:3px;padding:0 4px;font-size:9px;color:#4ade80">${escapeHtml(langShort)}</span> ${escapeHtml(aCtx.label)}</div><code>${escapeHtml(aCtx.code.slice(0, 500))}${aCtx.code.length > 500 ? '\n...' : ''}</code></div>`;
  }
  if (ctx) {
    bubble += `<div class="context-block"><div class="context-header">📎 ${escapeHtml(ctx.label)}</div><code>${escapeHtml(ctx.code.slice(0, 500))}${ctx.code.length > 500 ? '\n...' : ''}</code></div>`;
  }
  for (const img of images) {
    bubble += `<img src="${img.dataUrl}">`;
  }
  if (text) bubble += escapeHtml(text).replace(/\n/g, '<br>');

  div.innerHTML = `
    <div class="msg-avatar">⭐</div>
    <div class="msg-content">
      <div class="msg-bubble">${bubble}</div>
      <div class="msg-time">${timeStr()}</div>
    </div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function addAIMessage() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble streaming';
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = timeStr();
  const content = document.createElement('div');
  content.className = 'msg-content';
  content.appendChild(bubble);
  content.appendChild(time);
  div.innerHTML = '<div class="msg-avatar">🐱</div>';
  div.appendChild(content);
  msgs.appendChild(div);
  scrollBottom();
  return bubble;
}

async function streamResponse(el) {
  isStreaming = true;
  sendBtn.innerHTML = '■';
  sendBtn.classList.add('stop');
  sendBtn.title = '停止';
  setStatus('思考中...', 'thinking');

  abortCtrl = new AbortController();
  let fullText = '';
  let usage = null;

  try {
    const model = modelSelect.value;
    const body = {
      model,
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        ...history
      ],
      stream: true,
      max_tokens: 4096,
      temperature: 0.7,
    };

    const res = await fetch('https://api.siliconflow.cn/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify(body),
      signal: abortCtrl.signal
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const evt = JSON.parse(raw);
          const delta = evt.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            el.innerHTML = renderMarkdown(fullText);
            el.querySelectorAll('pre code').forEach(addCopyBtn);
            scrollBottom();
          }
          if (evt.usage) usage = evt.usage;
        } catch {}
      }
    }

  } catch (err) {
    if (err.name === 'AbortError') {
      fullText += '\n\n*(已停止)*';
      el.innerHTML = renderMarkdown(fullText);
    } else {
      el.innerHTML = `<span style="color:var(--red)">⚠️ ${escapeHtml(err.message)}</span>`;
      setStatus('出错了', 'error');
      isStreaming = false;
      sendBtn.innerHTML = '↑';
      sendBtn.classList.remove('stop');
      sendBtn.title = '发送';
      history.pop();
      return;
    }
  }

  el.classList.remove('streaming');
  history.push({ role: 'assistant', content: fullText });
  saveSession();

  if (usage) {
    totalTokens += (usage.total_tokens || 0);
    document.getElementById('token-count').textContent = `${totalTokens} tokens`;
  }

  isStreaming = false;
  abortCtrl = null;
  sendBtn.innerHTML = '↑';
  sendBtn.classList.remove('stop');
  sendBtn.title = '发送 (Enter)';
  setStatus('就绪');
  scrollBottom();
}

function addAIMessageStatic(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `
    <div class="msg-avatar">🐱</div>
    <div class="msg-content">
      <div class="msg-bubble">${renderMarkdown(text)}</div>
    </div>`;
  msgs.appendChild(div);
}

function stopStreaming() {
  abortCtrl?.abort();
}

// ── Markdown renderer ──
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = escapeHtml(code.trimEnd());
    return `<pre><div class="code-header"><span>${lang || 'code'}</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><code class="language-${lang}">${escaped}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Blockquote
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // HR
  text = text.replace(/^---+$/gm, '<hr>');
  // Lists
  text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Links
  text = text.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Line breaks (not inside tags)
  text = text.replace(/\n\n/g, '</p><p>');
  text = text.replace(/\n/g, '<br>');
  text = `<p>${text}</p>`;
  // Clean up empty paragraphs
  text = text.replace(/<p><\/p>/g, '');
  text = text.replace(/<p>(<(?:pre|ul|ol|h[1-6]|blockquote|hr))/g, '$1');
  text = text.replace(/(<\/(?:pre|ul|ol|h[1-6]|blockquote|hr)>)<\/p>/g, '$1');
  return text;
}

function addCopyBtn(el) {
  const pre = el.parentElement;
  if (!pre.querySelector('.code-header')) return;
}
function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓ 已复制';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

// ── Utils ──
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function timeStr() {
  return new Date().toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' });
}
function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}
function setStatus(text, state = 'ok') {
  document.getElementById('status-text').textContent = text;
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state === 'thinking' ? ' thinking' : state === 'error' ? ' error' : '');
}
function addSystemHint(text) {
  const msgs = document.getElementById('messages');
  const el = document.createElement('div');
  el.style.cssText = 'text-align:center;padding:6px 12px;margin:4px 10px;color:var(--text-muted);font-size:11px;background:var(--bg2);border-radius:8px;border:1px solid var(--border);';
  el.textContent = '⚠ ' + text;
  msgs.appendChild(el);
  scrollBottom();
  setTimeout(() => el.remove(), 4000);
}
</script>
